<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="player">
      <h2>🎵 Web Music Player</h2>

      <!-- Playlist -->
      <ul id="playlist">
        <li data-src="songs/song1.mp3">Song 1</li>
        <li data-src="songs/song2.mp3">Song 2</li>
        <li data-src="songs/song3.mp3">Song 3</li>
      </ul>

      <!-- Song Info -->
      <div class="song-info">
        <p id="songTitle">Select a song</p>
      </div>

      <!-- Audio -->
      <audio id="audio"></audio>

      <!-- Progress -->
      <input type="range" id="progress" value="0" />

      <!-- Controls -->
      <div class="controls">
        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>
      </div>

      <!-- Volume -->
      <div class="volume">
        <label>Volume</label>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="1" />
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
